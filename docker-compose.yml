version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mt8821c_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mt8821c_db
      MYSQL_USER: mt8821c_user
      MYSQL_PASSWORD: mt8821c_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build: ./backend
    container_name: mt8821c_backend
    environment:
      DATABASE_URL: mysql+pymysql://mt8821c_user:mt8821c_pass@mysql:3306/mt8821c_db
      MT8821C_HOST: 192.168.1.100
      MT8821C_PORT: 5025
      MT8821C_TIMEOUT: 10
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    image: nginx:alpine
    container_name: mt8821c_frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

volumes:
  mysql_data:
